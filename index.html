<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="robots" content="noindex">
<title>Erin Fernando — IT Administrator | Tucson, AZ</title>
<meta name="description" content="Erin Fernando — IT Administrator, Tucson AZ. Site is being refreshed and will be back shortly.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #1a5276;
    --navy-dark: #0d2b3e;
    --accent: #2e86c1;
    --line: rgba(255,255,255,0.14);
    --muted: rgba(255,255,255,0.72);
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #fff;
    background: radial-gradient(1200px 600px at 50% -10%, var(--navy) 0%, var(--navy-dark) 60%, #08202f 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    line-height: 1.6;
  }
  main {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .badge {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: clamp(30px, 7vw, 46px);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }
  .role {
    font-size: clamp(15px, 3.4vw, 18px);
    color: var(--muted);
    margin-top: 8px;
  }
  .divider {
    width: 56px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    margin: 26px auto;
  }
  p.note {
    font-size: clamp(15px, 3.4vw, 17px);
    color: rgba(255,255,255,0.88);
    max-width: 44ch;
    margin: 0 auto;
  }
  .contact {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  a.btn {
    display: inline-block;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    color: #fff;
    background: var(--accent);
    padding: 11px 22px;
    border-radius: 6px;
    transition: background 0.2s, transform 0.05s;
  }
  a.btn:hover { background: #3d95d0; }
  a.btn:active { transform: translateY(1px); }
  a.btn:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }
  footer {
    margin-top: 40px;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }
  @media (prefers-reduced-motion: reduce) {
    a.btn { transition: none; }
  }
</style>
</head>
<body>
<main>
  <span class="badge">Tucson, AZ &middot; CompTIA Security+</span>
  <h1>Erin Fernando</h1>
  <div class="role">IT Administrator</div>
  <div class="divider" aria-hidden="true"></div>
  <p class="note">This site is being refreshed and will be back shortly. Thanks for stopping by &mdash; I'd love to connect in the meantime.</p>
  <div class="contact">
    <a class="btn" href="https://linkedin.com/in/erin-fernando-82458840b/">Connect on LinkedIn</a>
  </div>
  <footer>&copy; 2026 Erin Fernando</footer>
</main>
</body>
</html>
